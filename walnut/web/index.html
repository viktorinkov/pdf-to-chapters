<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>walnut</title>
  <meta name="description" content="walnut adds chapter bookmarks to PDFs using a local LLM running on your machine.">
  <meta name="color-scheme" content="light dark">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="/static/style.css">
  <!-- Alpine.js is self-hosted from /static/alpine.min.js (downloaded at build time
       from https://unpkg.com/alpinejs@3.14.1). If that file is missing for any reason,
       comment the line below and uncomment the unpkg link as a fallback. -->
  <script defer src="/static/alpine.min.js"></script>
  <!-- <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script> -->
  <script defer src="/static/walnut.js"></script>
</head>
<body x-data="walnut()" x-cloak>
  <header class="topbar">
    <a class="brand" href="/" aria-label="walnut home">
      walnut<span class="dot" aria-hidden="true"></span>
    </a>
    <nav class="nav" aria-label="primary">
      <button type="button" class="linklike" @click="aboutOpen = true">about</button>
      <a href="https://github.com/viktorminchev/walnut" target="_blank" rel="noopener noreferrer">github</a>
    </nav>
  </header>

  <main>
    <!-- ============ Screen 1: idle ============ -->
    <section
      class="screen"
      x-show="screen === 'idle'"
      x-transition.opacity.duration.200ms
      aria-labelledby="idle-heading"
    >
      <p id="idle-heading" class="tagline">add chapter bookmarks to a pdf using a local model.</p>

      <label
        class="card dropzone"
        :class="{ hover: hover }"
        @dragenter.prevent="onDragEnter()"
        @dragover.prevent="hover = true"
        @dragleave.prevent="onDragLeave()"
        @drop.prevent="onDrop($event)"
      >
        <input
          type="file"
          accept="application/pdf,.pdf"
          hidden
          x-ref="fp"
          @change="onPick($event)"
        >
        <div class="dropzone-inner">
          <p class="headline">drag a pdf here, or click to browse</p>
          <p class="sub">up to 200 mb . one file at a time</p>
        </div>
      </label>
    </section>

    <!-- ============ Screen 2: run ============ -->
    <section
      class="screen"
      x-show="screen === 'run'"
      x-transition.opacity.duration.200ms
      aria-labelledby="run-heading"
    >
      <article class="card">
        <h2 id="run-heading" class="serif" style="margin:0 0 var(--gap-1);">
          <span x-text="job.filename || 'processing...'"></span>
        </h2>
        <p class="run-meta">
          <span x-text="job.size_bytes ? fmtSize(job.size_bytes) : ''"></span>
          <template x-if="job.size_bytes && job.page_count"> . </template>
          <span x-text="job.page_count ? fmtPages(job.page_count) : ''"></span>
        </p>

        <div class="bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" :aria-valuenow="pct">
          <div class="fill" :style="`width:${pct}%`"></div>
        </div>
        <p class="status-line" role="status" aria-live="polite">
          <span x-text="status"></span>
          <span class="muted"> . </span>
          <span class="muted" x-text="`${pct}%`"></span>
        </p>

        <div class="log" aria-live="polite" aria-label="processing log">
          <template x-for="line in logLines" :key="line.id">
            <div class="line" x-text="line.text"></div>
          </template>
        </div>

        <div class="run-actions">
          <button type="button" class="btn danger" @click="cancel()">cancel</button>
        </div>
      </article>
    </section>

    <!-- ============ Screen 3: preview ============ -->
    <section
      class="screen"
      x-show="screen === 'preview'"
      x-transition.opacity.duration.200ms
      aria-labelledby="preview-heading"
    >
      <article class="card">
        <header class="preview-head">
          <h2 id="preview-heading">review the chapters</h2>
          <span class="meta">
            <span x-text="job.filename"></span>
            <template x-if="job.page_count"> . </template>
            <span x-text="job.page_count ? fmtPages(job.page_count) : ''"></span>
          </span>
        </header>

        <div class="chapters" role="list">
          <template x-for="(c, i) in chapters" :key="c.id">
            <div
              class="chapter"
              role="listitem"
              :class="{ 'low-conf': c.flag === 'low_conf' }"
              :data-level="c.level"
              :style="`--i:${i}`"
            >
              <div class="title-cell">
                <template x-if="!c.editing">
                  <span
                    class="title-text"
                    tabindex="0"
                    role="textbox"
                    @click="c.editing = true"
                    @keydown.enter.prevent="c.editing = true"
                    x-text="c.title || 'Untitled'"
                  ></span>
                </template>
                <template x-if="c.editing">
                  <input
                    type="text"
                    class="title-input"
                    :value="c.title"
                    @input="editTitle(i, $event.target.value)"
                    @blur="c.editing = false"
                    @keydown.enter.prevent="c.editing = false"
                    @keydown.escape.prevent="c.editing = false"
                    x-init="$nextTick(() => $el.focus())"
                  >
                </template>
                <template x-if="c.flag === 'low_conf'">
                  <span class="flag" title="low confidence: the model wasn't sure about this entry">
                    <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
                      <path d="M8 1.2 15.4 14H0.6L8 1.2Zm0 4.6v4.4M8 12.2v.6"
                            stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round"/>
                    </svg>
                    low conf
                  </span>
                </template>
              </div>

              <div class="level-cell" role="group" aria-label="heading level">
                <button type="button" class="lvl" :class="{ active: c.level === 1 }" @click="setLevel(i, 1)" aria-label="level 1">1</button>
                <button type="button" class="lvl" :class="{ active: c.level === 2 }" @click="setLevel(i, 2)" aria-label="level 2">2</button>
                <button type="button" class="lvl" :class="{ active: c.level === 3 }" @click="setLevel(i, 3)" aria-label="level 3">3</button>
              </div>

              <div class="page-cell">
                <button type="button" class="nudge" @click="nudgePage(i, -5)" aria-label="page minus five">-5</button>
                <button type="button" class="nudge" @click="nudgePage(i, -1)" aria-label="page minus one">-1</button>
                <span class="page-num" x-text="`p.${c.page}`"></span>
                <button type="button" class="nudge" @click="nudgePage(i, 1)" aria-label="page plus one">+1</button>
                <button type="button" class="nudge" @click="nudgePage(i, 5)" aria-label="page plus five">+5</button>
              </div>

              <button type="button" class="del" @click="deleteChapter(i)" aria-label="delete chapter">x</button>
            </div>
          </template>
        </div>

        <template x-if="chapters.length === 0">
          <p class="empty-note">no chapters yet. add one below.</p>
        </template>

        <div class="preview-actions">
          <div class="left">
            <button type="button" class="btn secondary" @click="addChapter()">+ add chapter</button>
          </div>
          <div class="right">
            <button type="button" class="btn ghost" @click="cancel()">cancel</button>
            <button type="button" class="btn" @click="confirm()" :disabled="confirming">
              looks good . save pdf
            </button>
          </div>
        </div>
      </article>
    </section>

    <!-- ============ Screen 4: done ============ -->
    <section
      class="screen"
      x-show="screen === 'done'"
      x-transition.opacity.duration.200ms
      aria-labelledby="done-heading"
    >
      <article class="card">
        <h2 id="done-heading" class="done-head">
          done . <span x-text="chapters.length"></span> chapter<span x-text="chapters.length === 1 ? '' : 's'"></span>
        </h2>
        <p class="muted mono" style="margin: 0 0 var(--gap-3);">
          your download should start automatically.
        </p>

        <ul class="done-list">
          <template x-for="(c, i) in chapters" :key="c.id">
            <li :data-level="c.level" :style="`--i:${i}`">
              <span x-text="c.title || 'Untitled'"></span>
              <span class="pg" x-text="`p. ${c.page}`"></span>
            </li>
          </template>
        </ul>

        <div class="done-actions">
          <a
            class="btn large"
            :href="job.id ? `/jobs/${job.id}/download` : '/'"
            :download="downloadFilename()"
            x-text="`download ${downloadFilename()}`"
          ></a>
          <button type="button" class="btn secondary" @click="reset()">do another</button>
        </div>
      </article>
    </section>

    <!-- ============ Screen 5: err ============ -->
    <section
      class="screen"
      x-show="screen === 'err'"
      x-transition.opacity.duration.200ms
      aria-labelledby="err-heading"
    >
      <article class="card">
        <h2 id="err-heading" class="err-head">could not bookmark this pdf</h2>
        <p class="err-msg" x-text="errMsg"></p>
        <div class="run-actions">
          <button type="button" class="btn" @click="reset()">try another</button>
        </div>
      </article>
    </section>
  </main>

  <footer class="statusbar">
    <span>
      <span
        class="dot-status"
        :class="{
          ok: healthStatus.state === 'ok',
          warn: healthStatus.state === 'warn',
          err: healthStatus.state === 'err'
        }"
        aria-hidden="true"
      ></span>
      <span x-text="healthStatus.text"></span>
    </span>
    <span class="muted">runs locally on 127.0.0.1</span>
  </footer>

  <!-- ============ About modal ============ -->
  <template x-if="aboutOpen">
    <div
      class="modal-backdrop"
      @click.self="aboutOpen = false"
      @keydown.escape.window="aboutOpen = false"
      role="dialog"
      aria-modal="true"
      aria-labelledby="about-heading"
    >
      <div class="modal">
        <h2 id="about-heading">about walnut</h2>
        <p>
          walnut adds chapter bookmarks to a pdf so you can jump straight to a chapter from any pdf
          reader's outline pane. point it at a book, a thesis, or a long technical manual; it reads
          the text, finds the chapter starts, and writes the bookmarks back into the file.
        </p>
        <p>
          it runs entirely on your own machine. the heavy lifting is done by a local llm via
          <span class="mono">Ollama</span>, using the <span class="mono">Gemma 4</span> model. there
          is no server in the cloud, no api key, and no account to create.
        </p>
        <p>
          your pdfs never leave your computer. uploaded files are written only to a temporary folder
          on disk and are deleted an hour after the job finishes. walnut sets no cookies and runs no
          analytics.
        </p>
        <p class="credit">
          Built by
          <a href="https://www.linkedin.com/in/viktor-minchev/" target="_blank" rel="noopener noreferrer">Viktor Minchev</a>.
        </p>
        <div class="modal-close">
          <button type="button" class="btn secondary" @click="aboutOpen = false">close</button>
        </div>
      </div>
    </div>
  </template>

  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
