<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64">
  <style>
    .ink { fill: #2a1f17; }
    .bark { fill: #6b4a2b; }
    @media (prefers-color-scheme: dark) {
      .ink  { fill: #f0e8db; }
      .bark { fill: #c8a37a; }
    }
  </style>
  <text x="100" y="48" text-anchor="middle"
        font-family="Fraunces, 'Times New Roman', Georgia, serif"
        font-weight="600"
        font-size="44"
        letter-spacing="-1.3"
        class="ink">walnut <tspan class="bark">&#8226;</tspan></text>
</svg>
