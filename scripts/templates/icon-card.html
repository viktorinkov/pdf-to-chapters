<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>walnut icon</title>
<style>
  @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap");
  html, body { margin: 0; padding: 0; }
  body {
    background: #f7f3ec;
    color: #2a1f17;
    width: 100vw;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Fraunces, serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .brand {
    font-weight: 600;
    font-size: 26vw;
    letter-spacing: -0.028em;
    line-height: 1;
    display: inline-flex;
    align-items: baseline;
    gap: 0.06em;
    transform: translateY(-1vw);
  }
  .brand .dot {
    display: inline-block;
    width: 3.6vw;
    height: 3.6vw;
    border-radius: 50%;
    background: #6b4a2b;
    transform: translateY(-0.06em);
    flex-shrink: 0;
  }
</style>
</head>
<body>
  <div class="brand">walnut<span class="dot"></span></div>
</body>
</html>
